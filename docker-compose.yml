version: '3.8'

services:

  # ---------- FRONTEND ----------
  frontend:
    build: ./fitness-frontend
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - gateway

  # ---------------- REDIS ----------------
  redis:
    image: redis:7.2
    container_name: redis-microservice
    ports:
      - "6380:6379"

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight-microservice
    ports:
      - "5541:5540"
    depends_on:
      - redis

  # ---------------- EUREKA ----------------
  eureka:
    build: ./fitness-backend/Eureka
    container_name: eureka
    ports:
      - "8761:8761"

  # ---------------- CONFIG SERVER ----------------
  config-server:
    build: ./fitness-backend/configServer
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - eureka

  # ---------------- MONGODB ----------------
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  # ---------------- ZOOKEEPER ----------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # ---------------- KAFKA ----------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ---------------- USER SERVICE ----------------
  user-service:
    build: ./fitness-backend/UserService
    container_name: user-service
    ports:
      - "8080"
    environment:
       SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fitness_db
       SPRING_DATASOURCE_USERNAME: fitness_user
       SPRING_DATASOURCE_PASSWORD: fitness_pass
       SPRING_JPA_HIBERNATE_DDL_AUTO: update 
    depends_on:
      - eureka
      - config-server
      - redis
      - mysql

  # ---------------- ACTIVITY SERVICE ----------------
  activity-service:
    build: ./fitness-backend/ActivityService
    container_name: activity-service
    ports:
      - "8082"
    environment:
      MONGO_DB_ACTIVITY: AIActivityDB  
    depends_on:
      - eureka
      - config-server
      - redis
      - mongo
      - kafka

  # ---------------- AI SERVICE ----------------
  ai-service:
    build: ./fitness-backend/AIService
    container_name: ai-service
    ports:
      - "8083"
    environment:
      - OPENROUTER_API=${OPENROUTER_API}
      - GEMINI_KEY=${GEMINI_KEY}
      - GEMINI_URL=${GEMINI_URL}
      - GORQ_API=${GORQ_API}
      - MONGO_DB_AI=AiRecommendation
    depends_on:
      - eureka
      - config-server
      - mongo
      - kafka

  # ---------------- AUTH SERVICE ----------------
  auth-service:
    build: ./fitness-backend/AuthService
    container_name: auth-service
    ports:
      - "8085"
    depends_on:
      - eureka
      - config-server

  # ---------------- GATEWAY ----------------
  gateway:
    build: ./fitness-backend/gateway
    container_name: gateway
    ports:
      - "8084:8084"
    depends_on:
      - user-service
      - activity-service
      - ai-service
      - auth-service
      - eureka

  # postgres:
  #   image: postgres:15
  #   container_name: postgres
  #   environment:
  #     POSTGRES_DB: ${POSTGRES_DB}
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   ports:
  #     - "5433:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data


  mysql:
    image: mysql:8
    container_name: fitness-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fitness_db
      MYSQL_USER: fitness_user
      MYSQL_PASSWORD: fitness_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mongo-data:
  # postgres-data:
  mysql_data: