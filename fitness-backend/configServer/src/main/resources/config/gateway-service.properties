
#



server.port=8084

eureka.client.serviceUrl.defaultZone=http://eureka:8761/eureka


spring.data.redis.host=redis
spring.data.redis.port=6379

# USER-SERVICE
spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/users/**

# AI-SERVICE
spring.cloud.gateway.server.webflux.routes[1].id=ai-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://AI-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/recommendations/**

spring.cloud.gateway.server.webflux.routes[2].id=ai-chat-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://AI-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/ai/**

# ACTIVITY-SERVICE
spring.cloud.gateway.server.webflux.routes[3].id=activity-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://ACTIVITY-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/activities/**

# AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[4].id=auth-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/auth/**


spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].exposedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true

